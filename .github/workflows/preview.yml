on:
  push:
    branches:
      - master
  pull_request:

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: preview-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: rajyan/preview-pages@v1
        with:
          source-dir: full-stack-jira-app/site